<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Wordle - Classroom Wordle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="{{ url_for('student_select') }}" class="nav-link">← Back to Game Selection</a>
            <span class="student-info">Welcome, {{ student.name }}!</span>
            <a href="{{ url_for('student_logout') }}" class="nav-link">Logout</a>
        </nav>

        <h1>🔄 Infinite Wordle</h1>
        <p class="infinite-subtitle">Unlimited random 5-letter words to guess!</p>

        <div id="gameBoard" class="game-board">
            <!-- 6 rows of 5 tiles each -->
            <div class="row" data-row="0">
                <div class="tile" data-col="0"></div>
                <div class="tile" data-col="1"></div>
                <div class="tile" data-col="2"></div>
                <div class="tile" data-col="3"></div>
                <div class="tile" data-col="4"></div>
            </div>
            <div class="row" data-row="1">
                <div class="tile" data-col="0"></div>
                <div class="tile" data-col="1"></div>
                <div class="tile" data-col="2"></div>
                <div class="tile" data-col="3"></div>
                <div class="tile" data-col="4"></div>
            </div>
            <div class="row" data-row="2">
                <div class="tile" data-col="0"></div>
                <div class="tile" data-col="1"></div>
                <div class="tile" data-col="2"></div>
                <div class="tile" data-col="3"></div>
                <div class="tile" data-col="4"></div>
            </div>
            <div class="row" data-row="3">
                <div class="tile" data-col="0"></div>
                <div class="tile" data-col="1"></div>
                <div class="tile" data-col="2"></div>
                <div class="tile" data-col="3"></div>
                <div class="tile" data-col="4"></div>
            </div>
            <div class="row" data-row="4">
                <div class="tile" data-col="0"></div>
                <div class="tile" data-col="1"></div>
                <div class="tile" data-col="2"></div>
                <div class="tile" data-col="3"></div>
                <div class="tile" data-col="4"></div>
            </div>
            <div class="row" data-row="5">
                <div class="tile" data-col="0"></div>
                <div class="tile" data-col="1"></div>
                <div class="tile" data-col="2"></div>
                <div class="tile" data-col="3"></div>
                <div class="tile" data-col="4"></div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="guessInput" placeholder="Enter your guess" maxlength="5">
            <button onclick="makeGuess()" id="submitBtn" class="submit-btn">Submit Guess</button>
        </div>

        <!-- Mini Keyboard -->
        <div class="mini-keyboard">
            <div class="keyboard-row">
                <button class="key" onclick="addLetter('Q')">Q</button>
                <button class="key" onclick="addLetter('W')">W</button>
                <button class="key" onclick="addLetter('E')">E</button>
                <button class="key" onclick="addLetter('R')">R</button>
                <button class="key" onclick="addLetter('T')">T</button>
                <button class="key" onclick="addLetter('Y')">Y</button>
                <button class="key" onclick="addLetter('U')">U</button>
                <button class="key" onclick="addLetter('I')">I</button>
                <button class="key" onclick="addLetter('O')">O</button>
                <button class="key" onclick="addLetter('P')">P</button>
            </div>
            <div class="keyboard-row">
                <button class="key" onclick="addLetter('A')">A</button>
                <button class="key" onclick="addLetter('S')">S</button>
                <button class="key" onclick="addLetter('D')">D</button>
                <button class="key" onclick="addLetter('F')">F</button>
                <button class="key" onclick="addLetter('G')">G</button>
                <button class="key" onclick="addLetter('H')">H</button>
                <button class="key" onclick="addLetter('J')">J</button>
                <button class="key" onclick="addLetter('K')">K</button>
                <button class="key" onclick="addLetter('L')">L</button>
            </div>
            <div class="keyboard-row">
                <button class="key special-key" onclick="makeGuess()">ENTER</button>
                <button class="key" onclick="addLetter('Z')">Z</button>
                <button class="key" onclick="addLetter('X')">X</button>
                <button class="key" onclick="addLetter('C')">C</button>
                <button class="key" onclick="addLetter('V')">V</button>
                <button class="key" onclick="addLetter('B')">B</button>
                <button class="key" onclick="addLetter('N')">N</button>
                <button class="key" onclick="addLetter('M')">M</button>
                <button class="key special-key" onclick="deleteLetter()">⌫</button>
            </div>
        </div>

        <div id="message" class="message"></div>
        <div id="gameResult" class="game-result"></div>

        <!-- Stats Popup Modal -->
        <div id="statsModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>🎉 Game Complete!</h2>
                <div id="gameOutcome"></div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="totalGames">0</div>
                        <div class="stat-label">Games Played</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="winRate">0%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="currentStreak">0</div>
                        <div class="stat-label">Current Streak</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="totalWins">0</div>
                        <div class="stat-label">Total Wins</div>
                    </div>
                </div>
                <button onclick="newGame()" class="new-game-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        let currentRow = 0;
        let gameOver = false;
        let usedLetters = {
            correct: new Set(),
            present: new Set(),
            absent: new Set()
        };
        let targetWord;

        function addLetter(letter) {
            if (gameOver) return;

            const input = document.getElementById('guessInput');
            if (input.value.length < 5) {
                input.value += letter;
            }
        }

        function deleteLetter() {
            if (gameOver) return;

            const input = document.getElementById('guessInput');
            input.value = input.value.slice(0, -1);
        }

        function updateKeyboard(guess, result) {
            guess.split('').forEach((letter, index) => {
                const keyButton = Array.from(document.querySelectorAll('.key')).find(key => key.textContent === letter);
                if (keyButton) {
                    if (result[index] === 'correct') {
                        usedLetters.correct.add(letter);
                        keyButton.className = 'key correct';
                    } else if (result[index] === 'present') {
                        if (!usedLetters.correct.has(letter)) {
                            usedLetters.present.add(letter);
                            keyButton.className = 'key present';
                        }
                    } else if (result[index] === 'absent') {
                        if (!usedLetters.correct.has(letter) && !usedLetters.present.has(letter)) {
                            usedLetters.absent.add(letter);
                            keyButton.className = 'key absent';
                        }
                    }
                }
            });
        }

        async function loadGameState() {
            try {
                const response = await fetch('/infinite/get_game_state');
                const data = await response.json();

                if (data.error) {
                    window.location.href = '/student/login';
                    return;
                }

                // Restore previous guesses
                data.guesses.forEach((guess, rowIndex) => {
                    const row = document.querySelector(`[data-row="${rowIndex}"]`);
                    guess.word.split('').forEach((letter, colIndex) => {
                        const tile = row.querySelector(`[data-col="${colIndex}"]`);
                        tile.textContent = letter;
                        tile.className = `tile ${guess.result[colIndex]}`;
                    });
                    // Update keyboard for each previous guess
                    updateKeyboard(guess.word, guess.result);
                });

                currentRow = data.guesses.length;
                gameOver = data.game_over;
                targetWord = data.target_word;

                if (data.game_over) {
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('guessInput').disabled = true;

                    if (data.won) {
                        document.getElementById('gameResult').innerHTML = '<h3 style="color: #6aaa64;">🎉 Congratulations! You won!</h3>';
                    } else {
                        document.getElementById('gameResult').innerHTML = '<h3 style="color: #787c7e;">😔 Game Over! Better luck next time!</h3>';
                    }
                }

            } catch (error) {
                console.error('Error loading game state:', error);
            }
        }

        async function makeGuess() {
            if (gameOver) return;

            const guess = document.getElementById('guessInput').value.toUpperCase();
            const messageDiv = document.getElementById('message');

            if (guess.length !== 5) {
                messageDiv.textContent = 'Please enter exactly 5 letters';
                messageDiv.className = 'message error';
                return;
            }

            try {
                const response = await fetch('/infinite/make_guess', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ guess: guess })
                });

                const data = await response.json();

                if (!data.success) {
                    messageDiv.textContent = data.message;
                    messageDiv.className = 'message error';
                    return;
                }

                // Update the game board
                const row = document.querySelector(`[data-row="${currentRow}"]`);
                guess.split('').forEach((letter, index) => {
                    const tile = row.querySelector(`[data-col="${index}"]`);
                    tile.textContent = letter;
                    setTimeout(() => {
                        tile.className = `tile ${data.result[index]}`;
                    }, index * 100);
                });

                // Update keyboard
                updateKeyboard(guess, data.result);

                currentRow++;
                document.getElementById('guessInput').value = '';
                messageDiv.textContent = '';

                if (data.game_over) {
                    gameOver = true;
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('guessInput').disabled = true;

                    setTimeout(() => {
                        showStatsModal(data);
                    }, 1000);
                }

            } catch (error) {
                console.error('Error making guess:', error);
                messageDiv.textContent = 'Error making guess - please try again';
                messageDiv.className = 'message error';
            }
        }

        function showStatsModal(gameData) {
            const modal = document.getElementById('statsModal');
            const outcomeDiv = document.getElementById('gameOutcome');

            if (gameData.won) {
                outcomeDiv.innerHTML = `
                    <div class="outcome-message win">
                        <h3>🎉 Congratulations!</h3>
                        <p>You solved it in ${gameData.guess_count}/6 guesses!</p>
                        <p class="next-word-info">A new random word is ready for you!</p>
                        <button onclick="viewSolutions()" class="solutions-btn">View Solutions</button>
                    </div>
                `;
            } else {
                outcomeDiv.innerHTML = `
                    <div class="outcome-message lose">
                        <h3>😔 Better luck next time!</h3>
                        <p>The word was: <strong>${gameData.target_word}</strong></p>
                        <p class="next-word-info">Try a new random word!</p>
                        <button onclick="viewSolutions()" class="solutions-btn">View Solutions</button>
                    </div>
                `;
            }

            // Update stats
            document.getElementById('totalGames').textContent = gameData.stats.total_games;
            document.getElementById('winRate').textContent = gameData.stats.win_rate + '%';
            document.getElementById('currentStreak').textContent = gameData.stats.current_streak;
            document.getElementById('totalWins').textContent = gameData.stats.total_wins;

            modal.style.display = 'block';
        }

        function viewSolutions() {
            if (targetWord) {
                window.open(`/solutions/${targetWord}/infinite`, '_blank');
            }
        }

        async function newGame() {
            try {
                const response = await fetch('/infinite/new_game', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    // Reset keyboard state
                    usedLetters = {
                        correct: new Set(),
                        present: new Set(),
                        absent: new Set()
                    };
                    document.querySelectorAll('.key').forEach(key => {
                        if (!key.classList.contains('special-key')) {
                            key.className = 'key';
                        }
                    });
                    location.reload();
                }
            } catch (error) {
                console.error('Error starting new game:', error);
            }
        }

        // Modal close functionality
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('statsModal');
            const span = document.getElementsByClassName('close')[0];

            span.onclick = function() {
                modal.style.display = 'none';
            }

            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = 'none';
                }
            }
        });

        document.getElementById('guessInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                makeGuess();
            }
        });

        document.getElementById('guessInput').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        // Load game state on page load
        loadGameState();
    </script>
</body>
</html>
