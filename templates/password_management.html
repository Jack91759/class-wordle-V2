
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Management - Classroom Wordle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="{{ url_for('teacher') }}" class="nav-link">← Back to Teacher Panel</a>
        </nav>

        <h1>🔐 Password Management</h1>
        <p>Manage student passwords and account access</p>

        <div class="password-management-panel">
            {% if students %}
            <div class="password-table">
                <div class="password-header">
                    <span>Student Name</span>
                    <span>Username</span>
                    <span>Password</span>
                    <span>Actions</span>
                </div>
                {% for student in students %}
                <div class="password-row">
                    <span class="student-name">{{ student.name }}</span>
                    <span class="username">{{ student.username }}</span>
                    <span class="password-display">
                        <input type="password" value="••••••••" readonly class="password-field" id="password-{{ student.id }}">
                        <button onclick="togglePassword({{ student.id }})" class="toggle-password-btn" id="toggle-{{ student.id }}">👁️</button>
                    </span>
                    <span class="password-actions">
                        <button onclick="editPassword({{ student.id }}, '{{ student.name }}')" class="edit-password-btn">✏️ Change Password</button>
                        <button onclick="resetPassword({{ student.id }}, '{{ student.name }}')" class="reset-password-btn">🔄 Reset to Default</button>
                    </span>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <p class="no-students">No students found.</p>
            {% endif %}
        </div>

        <div class="password-actions">
            <div class="bulk-actions">
                <h3>Bulk Actions</h3>
                <button onclick="generateRandomPasswords()" class="bulk-btn">🎲 Generate Random Passwords for All</button>
                <button onclick="exportPasswords()" class="bulk-btn">📄 Export Password List</button>
            </div>
        </div>
    </div>

    <script>
        let passwordVisible = {};
        let studentPasswords = {};

        function togglePassword(studentId) {
            const passwordField = document.getElementById(`password-${studentId}`);
            const toggleBtn = document.getElementById(`toggle-${studentId}`);

            if (passwordVisible[studentId]) {
                passwordField.value = '••••••••';
                toggleBtn.textContent = '👁️';
                passwordVisible[studentId] = false;
            } else {
                loadStudentPassword(studentId);
            }
        }

        async function loadStudentPassword(studentId) {
            try {
                const response = await fetch(`/teacher/get_student_password/${studentId}`);
                const data = await response.json();

                if (data.success) {
                    const passwordField = document.getElementById(`password-${studentId}`);
                    const toggleBtn = document.getElementById(`toggle-${studentId}`);

                    // Show the actual password
                    passwordField.value = data.password;
                    toggleBtn.textContent = '🙈';
                    passwordVisible[studentId] = true;
                } else {
                    alert('Error loading password');
                }
            } catch (error) {
                alert('Error loading password');
            }
        }

        function editPassword(studentId, studentName) {
            const newPassword = prompt(`Enter new password for ${studentName}:`);
            if (newPassword && newPassword.length >= 4) {
                updateStudentPassword(studentId, newPassword);
            } else if (newPassword !== null) {
                alert('Password must be at least 4 characters long');
            }
        }

        function resetPassword(studentId, studentName) {
            if (confirm(`Reset password for ${studentName} to "password123"?`)) {
                updateStudentPassword(studentId, 'password123');
            }
        }

        async function updateStudentPassword(studentId, newPassword) {
            try {
                const response = await fetch('/teacher/update_student_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        student_id: studentId,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Password updated successfully!');
                    // Reset the password display
                    if (passwordVisible[studentId]) {
                        document.getElementById(`password-${studentId}`).value = '••••••••';
                        document.getElementById(`toggle-${studentId}`).textContent = '👁️';
                        passwordVisible[studentId] = false;
                    }
                } else {
                    alert('Error updating password: ' + data.message);
                }
            } catch (error) {
                alert('Error updating password');
            }
        }

        function generateRandomPasswords() {
            if (confirm('Generate random passwords for ALL students? This will replace all existing passwords.')) {
                // Implementation for bulk password generation
                alert('Feature coming soon - Generate random passwords for all students');
            }
        }

        function exportPasswords() {
            alert('Feature coming soon - Export password list to text file');
        }
    </script>
</body>
</html>
